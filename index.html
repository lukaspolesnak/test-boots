<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FootScan</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  background:#000;
  font-family:sans-serif;
  color:#fff;
  overflow:hidden;
}
#wrap {
  position:fixed; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
}
/* KEY FIX: no object-fit, explicit 100vw/100vh, translateZ forces GPU layer */
video {
  width:100vw;
  height:100vh;
  -webkit-transform: translateZ(0);
  transform: translateZ(0);
  background:#000;
}
#ui {
  position:fixed; bottom:40px; left:0; right:0;
  text-align:center; display:none;
}
#ui p { font-size:14px; color:#0ff; margin-bottom:8px; }
#ui small { font-size:11px; color:#666; }
#startBtn {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  padding:18px 44px; border-radius:16px; border:none;
  background:#00e5ff; color:#000;
  font-size:17px; font-weight:700; cursor:pointer;
  box-shadow:0 8px 30px rgba(0,229,255,.4);
}
#err {
  position:fixed; inset:0; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  padding:30px; text-align:center; gap:10px;
}
#err h2 { color:#f44; font-size:20px; }
#err p { font-size:13px; color:#aaa; line-height:1.7; }
</style>
</head>
<body>

<div id="wrap">
  <video id="vid" autoplay playsinline muted></video>
</div>

<button id="startBtn" onclick="go()">📷 Spustiť kameru</button>

<div id="ui">
  <p id="status">✅ Kamera funguje!</p>
  <small id="res"></small>
</div>

<div id="err">
  <h2>❌ Chyba</h2>
  <p id="errMsg"></p>
</div>

<script>
async function go() {
  document.getElementById('startBtn').style.display = 'none';

  const vid = document.getElementById('vid');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' } },
      audio: false
    });

    vid.srcObject = stream;
    vid.muted = true;
    vid.playsInline = true;

    // iOS Safari sometimes needs manual play after srcObject set
    const playPromise = vid.play();
    if (playPromise !== undefined) {
      playPromise.catch(() => {
        // retry once
        setTimeout(() => vid.play(), 200);
      });
    }

    // Force repaint after short delay — fixes iOS black screen bug
    setTimeout(() => {
      vid.style.opacity = '0.99';
      setTimeout(() => { vid.style.opacity = '1'; }, 50);
    }, 300);

    setTimeout(() => {
      const ui = document.getElementById('ui');
      ui.style.display = 'block';
      document.getElementById('res').textContent =
        vid.videoWidth + '×' + vid.videoHeight + ' — ' + (vid.paused ? 'PAUSED ⚠️' : 'Playing ✅');
    }, 1500);

  } catch(e) {
    const ed = document.getElementById('err');
    ed.style.display = 'flex';
    document.getElementById('errMsg').innerHTML =
      '<b>' + e.name + '</b><br>' + e.message + '<br><br>' +
      'Skontroluj:<br>' +
      '• Nastavenia → Safari → Kamera → Povoliť<br>' +
      '• Nie si v anonymnom okne<br>' +
      '• Stránka je cez HTTPS';
  }
}
</script>

</body>
</html>
